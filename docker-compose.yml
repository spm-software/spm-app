services:
  mongo:
    image: mongo:8.2
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: spm
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - ./backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017
      CORS_ORIGINS: http://localhost:3000
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - ./frontend/.env
    environment:
      VITE_BACKEND_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev --host 0.0.0.0"

volumes:
  mongo_data:
  frontend_node_modules:
