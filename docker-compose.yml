services:
  mongo:
    image: mongo:8.2
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: spm
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      MONGO_URL: mongodb://mongo:27017
      CORS_ORIGINS: http://localhost:3000
      PORT: 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    command: uvicorn server:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs', timeout=2)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./frontend/.env
    environment:
      VITE_BACKEND_URL: http://localhost:8000
      CI: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "pnpm install --frozen-lockfile && pnpm dev"

volumes:
  mongo_data:
  frontend_node_modules:
