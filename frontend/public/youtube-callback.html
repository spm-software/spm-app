<!DOCTYPE html>
<html>
<head>
  <title>Conectando YouTube...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #1a1a1a;
      color: white;
    }
    .container {
      text-align: center;
      padding: 40px;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #333;
      border-top: 3px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .success {
      color: #22c55e;
    }
    .error {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h2 id="message">Conectando con YouTube...</h2>
    <p id="submessage">Por favor espera...</p>
  </div>

  <script>
    async function handleCallback() {
      const urlParams = new URLSearchParams(window.location.search);
      const code = urlParams.get('code');
      const error = urlParams.get('error');
      
      const spinner = document.getElementById('spinner');
      const message = document.getElementById('message');
      const submessage = document.getElementById('submessage');

      if (error) {
        spinner.style.display = 'none';
        message.textContent = 'Error de autenticación';
        message.className = 'error';
        submessage.textContent = error;
        setTimeout(() => window.close(), 3000);
        return;
      }

      if (!code) {
        spinner.style.display = 'none';
        message.textContent = 'No se recibió código';
        message.className = 'error';
        submessage.textContent = 'Cerrando ventana...';
        setTimeout(() => window.close(), 2000);
        return;
      }

      try {
        const redirectUri = window.location.origin + '/youtube-callback.html';
        
        const response = await fetch('/api/youtube/callback', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            code: code,
            redirect_uri: redirectUri
          })
        });

        const data = await response.json();

        if (response.ok) {
          spinner.style.display = 'none';
          message.textContent = '¡YouTube conectado!';
          message.className = 'success';
          submessage.textContent = 'Cerrando ventana...';
          
          // Notify parent window
          if (window.opener) {
            window.opener.postMessage({ type: 'youtube-auth-success' }, '*');
          }
          
          setTimeout(() => window.close(), 1500);
        } else {
          throw new Error(data.detail || 'Error desconocido');
        }
      } catch (err) {
        spinner.style.display = 'none';
        message.textContent = 'Error al conectar';
        message.className = 'error';
        submessage.textContent = err.message;
        
        if (window.opener) {
          window.opener.postMessage({ type: 'youtube-auth-error', error: err.message }, '*');
        }
        
        setTimeout(() => window.close(), 3000);
      }
    }

    handleCallback();
  </script>
</body>
</html>
